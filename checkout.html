<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZUCERO | Checkout</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .checkout-grid {
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: 4rem;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    input {
      width: 100%;
      padding: 1rem;
      border: 1px solid rgba(26,26,26,0.2);
      background: transparent;
      font-family: var(--font-sans);
      font-size: 1rem;
    }
    .order-summary {
      background: #F2EFE9;
      padding: 2rem;
    }
  </style>
</head>
<body class="theme-ivory">

  <nav style="justify-content: center; background: var(--color-ivory);">
    <a href="index.html" class="brand-logo text-gold">ZUCERO</a>
  </nav>

  <section style="padding-top: 15vh; min-height: 80vh;">
    <div class="container reveal-up" style="max-width: 1200px;">
      
      <div class="checkout-grid">
        <!-- Form Side -->
        <div>
          <h2 class="serif" style="font-size: 2rem; margin-bottom: 2rem;">Shipping Details</h2>
          
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group"><input type="text" placeholder="First Name"></div>
            <div class="form-group"><input type="text" placeholder="Last Name"></div>
          </div>
          <div class="form-group"><input type="text" placeholder="Address"></div>
          <div class="form-group"><input type="text" placeholder="City"></div>
          
          <h2 class="serif" style="font-size: 2rem; margin: 4rem 0 2rem 0;">Gift Options</h2>
          <div class="form-group">
            <input type="text" placeholder="Include a handwritten gift note (Optional)">
          </div>

          <h2 class="serif" style="font-size: 2rem; margin: 4rem 0 2rem 0;">Payment</h2>
          <div class="form-group"><input type="text" placeholder="Card Number"></div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group"><input type="text" placeholder="MM/YY"></div>
            <div class="form-group"><input type="text" placeholder="CVC"></div>
          </div>
          
          <a href="order-confirmation.html" class="btn-primary" style="margin-top: 2rem; width: 100%; text-align: center;">Place Order</a>
        </div>

        <!-- Summary Side -->
        <div class="order-summary">
          <h3 class="serif" style="font-size: 1.5rem; margin-bottom: 2rem;">Order Summary</h3>
          
          <div style="display: flex; gap: 1rem; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid rgba(26,26,26,0.1); padding-bottom: 2rem;">
            <img src="assets/images/khand_gold_reserve.png" alt="Khand" style="width: 60px; height: 80px; object-fit: cover;">
            <div style="flex: 1;">
              <h4 class="serif" style="font-size: 1.2rem;">Khand Gold Reserve</h4>
              <span class="caption">Qty: 1</span>
            </div>
            <span class="serif">$45.00</span>
          </div>

          <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
            <span class="body-regular">Subtotal</span>
            <span class="serif">$45.00</span>
          </div>
          <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
            <span class="body-regular">Shipping</span>
            <span class="serif">Complimentary</span>
          </div>
          
          <div style="display: flex; justify-content: space-between; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid rgba(26,26,26,0.1);">
            <span class="body-regular" style="font-weight: 500;">Total</span>
            <span class="serif" style="font-size: 1.5rem;">$45.00</span>
          </div>
        </div>
      </div>

    </div>
  </section>

  <script src="js/animations.js"></script>
</body>
</html>
