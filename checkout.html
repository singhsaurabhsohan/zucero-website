<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZUCERO | Checkout</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .checkout-grid {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 5rem;
    }
    .form-group { margin-bottom: 1.5rem; }
    input, select {
      width: 100%;
      padding: 1rem;
      border: 1px solid rgba(197,160,89,0.2);
      background: transparent;
      font-family: var(--sans);
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--charcoal);
      transition: border-color 0.3s ease;
    }
    input:focus {
      outline: none;
      border-color: var(--gold);
    }
    input::placeholder { color: rgba(20,20,20,0.35); }
    .order-summary {
      background: var(--cream);
      padding: 2.5rem;
      height: fit-content;
      position: sticky;
      top: 100px;
    }
    @media (max-width: 900px) {
      .checkout-grid { grid-template-columns: 1fr; gap: 3rem; }
      .order-summary { position: static; }
    }
  </style>
</head>
<body class="theme-ivory">

  <nav style="justify-content: center;">
    <a href="index.html" class="brand-logo">
      <img src="assets/images/zucerothegoodsugar-logo.png" alt="ZUCERO" class="logo-img">
    </a>
  </nav>

  <section style="padding-top: 14vh; min-height: 85vh;" data-theme="ivory">
    <div class="container reveal" style="max-width: 1100px;">

      <div style="text-align:center; margin-bottom: clamp(3rem, 5vw, 4rem);">
        <span class="chapter-mark" style="opacity:0.3;">Secure Checkout</span>
        <div class="crystal-dots" style="justify-content:center;"><span></span></div>
      </div>

      <div class="checkout-grid">
        <div>
          <h2 class="serif" style="font-size: 1.8rem; margin-bottom: 2rem;">Shipping</h2>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group"><input type="text" placeholder="First Name"></div>
            <div class="form-group"><input type="text" placeholder="Last Name"></div>
          </div>
          <div class="form-group"><input type="email" placeholder="Email"></div>
          <div class="form-group"><input type="text" placeholder="Address"></div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group"><input type="text" placeholder="City"></div>
            <div class="form-group"><input type="text" placeholder="Postal Code"></div>
          </div>

          <div class="divider-gold" style="margin: 3rem 0;"></div>

          <h2 class="serif" style="font-size: 1.8rem; margin-bottom: 2rem;">Payment</h2>
          <div class="form-group"><input type="text" placeholder="Card Number"></div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group"><input type="text" placeholder="MM / YY"></div>
            <div class="form-group"><input type="text" placeholder="CVC"></div>
          </div>

          <div class="divider-gold" style="margin: 3rem 0;"></div>

          <h2 class="serif" style="font-size: 1.8rem; margin-bottom: 1rem;">Gift Note</h2>
          <p class="body-regular" style="opacity:0.5; margin-bottom: 1.5rem; font-size: 0.9rem;">Include a handwritten note with your order.</p>
          <div class="form-group"><input type="text" placeholder="Your message (optional)"></div>

          <a href="order-confirmation.html" class="btn-primary" style="margin-top: 2rem; width: 100%; text-align: center;">Place Order</a>
        </div>

        <div class="order-summary">
          <h3 class="serif" style="font-size: 1.4rem; margin-bottom: 2rem;">Order Summary</h3>
          <div style="display: flex; gap: 1.5rem; align-items: center; padding-bottom: 2rem; border-bottom: 1px solid rgba(197,160,89,0.15);">
            <img src="assets/images/khand_gold_reserve.png" alt="Khand" style="width: 60px; height: 75px; object-fit: cover;">
            <div style="flex: 1;">
              <h4 class="serif" style="font-size: 1.1rem;">Khand Gold Reserve</h4>
              <span class="caption" style="opacity:0.4;">Qty: 1</span>
            </div>
            <span class="serif">$45</span>
          </div>

          <div style="margin-top: 2rem;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 0.8rem;">
              <span class="body-regular" style="opacity:0.5; font-size:0.9rem;">Subtotal</span>
              <span class="serif">$45.00</span>
            </div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 0.8rem;">
              <span class="body-regular" style="opacity:0.5; font-size:0.9rem;">Shipping</span>
              <span class="serif" style="color: var(--gold);">Complimentary</span>
            </div>
            <div style="display: flex; justify-content: space-between; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid rgba(197,160,89,0.15);">
              <span class="caption">Total</span>
              <span class="serif" style="font-size: 1.5rem; color: var(--gold);">$45.00</span>
            </div>
          </div>
        </div>
      </div>

    </div>
  </section>

  <script src="js/animations.js"></script>
</body>
</html>
