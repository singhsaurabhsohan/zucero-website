<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZUCERO | Cart</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .cart-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 4rem;
    }
    .cart-table th {
      text-align: left;
      font-family: var(--font-sans);
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      border-bottom: 1px solid rgba(26,26,26,0.2);
      padding-bottom: 1rem;
    }
    .cart-table td {
      padding: 2rem 0;
      border-bottom: 1px solid rgba(26,26,26,0.2);
    }
  </style>
</head>
<body class="theme-ivory">

  <nav>
    <div class="nav-links">
      <a href="collection.html">Collection</a>
      <a href="stories.html">Journal</a>
      <a href="founder.html">Heritage</a>
    </div>
    <a href="index.html" class="brand-logo" style="text-align: center; flex: 1;">ZUCERO</a>
    <div class="nav-actions">
      <a href="wishlist.html">Wishlist</a>
      <a href="cart.html">Cart (1)</a>
    </div>
  </nav>

  <section style="padding-top: 20vh; min-height: 80vh;">
    <div class="container reveal-up" style="max-width: 1000px;">
      <h1 class="title-large" style="margin-bottom: 4rem; text-align: center;">Your Cart</h1>

      <table class="cart-table">
        <thead>
          <tr>
            <th>Product</th>
            <th>Quantity</th>
            <th style="text-align: right;">Total</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td style="display: flex; gap: 2rem; align-items: center;">
              <img src="assets/images/khand_gold_reserve.png" alt="Khand" style="width: 100px; height: 120px; object-fit: cover;">
              <div>
                <h3 class="serif" style="font-size: 1.5rem; margin-bottom: 0.5rem;">Khand Gold Reserve</h3>
                <span class="caption text-gold">250g Jar</span>
                <br>
                <a href="#" style="font-size: 0.8rem; text-decoration: underline; margin-top: 1rem; display: inline-block;">Remove</a>
              </div>
            </td>
            <td>
              <div class="qty-selector">
                <span>-</span>
                <span>1</span>
                <span>+</span>
              </div>
            </td>
            <td style="text-align: right;">
              <span class="serif" style="font-size: 1.5rem;">$45.00</span>
            </td>
          </tr>
        </tbody>
      </table>

      <div style="display: flex; justify-content: flex-end;">
        <div style="width: 400px;">
          <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
            <span class="body-regular">Subtotal</span>
            <span class="serif" style="font-size: 1.5rem;">$45.00</span>
          </div>
          <p class="body-regular" style="font-size: 0.9rem; color: var(--color-gold-muted); margin-bottom: 2rem;">Shipping and taxes calculated at checkout.</p>
          <a href="checkout.html" class="btn-primary" style="width: 100%; text-align: center;">Proceed to Checkout</a>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <div class="footer-logo">ZUCERO</div>
    <span class="caption">The Emotion of Sweetness.</span>
  </footer>

  <script src="js/animations.js"></script>
</body>
</html>
