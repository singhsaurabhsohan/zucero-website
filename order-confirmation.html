<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZUCERO | Order Confirmed</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="theme-charcoal" style="min-height: 100vh;">

  <nav style="justify-content: center; background: transparent; border-bottom-color: transparent;">
    <a href="index.html" class="brand-logo">
      <img src="assets/images/zucerothegoodsugar-logo.png" alt="ZUCERO" class="logo-img">
    </a>
  </nav>

  <section style="padding-top: 25vh; text-align:center; min-height: 80vh;" data-theme="charcoal">
    <div class="container-narrow reveal">
      <span class="caption text-gold" style="margin-bottom: 2rem;">Order #ZC-8924</span>
      <div class="crystal-dots" style="justify-content:center;"><span></span></div>
      <h1 class="display text-gold" style="margin: 1.5rem 0;">The ritual<br>begins.</h1>
      <p class="body-large" style="opacity:0.5; margin-bottom: 4rem;">Your order has been received. Our artisans are preparing your selection with the care it deserves.</p>

      <div style="border-top: 1px solid rgba(197,160,89,0.15); border-bottom: 1px solid rgba(197,160,89,0.15); padding: 2.5rem 0; margin-bottom: 4rem; display: flex; justify-content: space-between; text-align: left;">
        <div>
          <span class="caption" style="opacity:0.4;">Shipping To</span>
          <p class="serif" style="font-size: 1.15rem; margin-top: 0.8rem; opacity:0.7;">123 Heritage Lane<br>New York, NY 10001</p>
        </div>
        <div style="text-align: right;">
          <span class="caption" style="opacity:0.4;">Total</span>
          <p class="serif" style="font-size: 1.8rem; margin-top: 0.5rem; color: var(--gold);">$45.00</p>
        </div>
      </div>

      <a href="index.html" class="btn-primary" style="border-color: rgba(245,240,232,0.2); color: var(--ivory);">Return to Origin</a>
    </div>
  </section>

  <script src="js/animations.js"></script>
</body>
</html>
