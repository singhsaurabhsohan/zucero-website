<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZUCERO | Order Confirmed</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="theme-charcoal" style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">

  <nav style="justify-content: center; background: transparent; backdrop-filter: none; border-bottom: none;">
    <a href="index.html" class="brand-logo text-gold">ZUCERO</a>
  </nav>

  <div class="container reveal-up" style="text-align: center; max-width: 600px;">
    <span class="caption text-gold" style="margin-bottom: 2rem; display: block;">Order #ZC-8924</span>
    <h1 class="serif" style="font-size: 3rem; margin-bottom: 2rem;">The Ritual Begins.</h1>
    <p class="body-regular" style="margin-bottom: 3rem; color: var(--color-ivory);">Your order has been received. Our artisans are preparing your selection with the care it deserves. You will receive an email shortly with shipping details.</p>
    
    <div style="border-top: 1px solid rgba(197, 160, 89, 0.3); border-bottom: 1px solid rgba(197, 160, 89, 0.3); padding: 2rem 0; margin-bottom: 3rem; text-align: left; display: flex; justify-content: space-between;">
      <div>
        <span class="caption">Shipping To</span>
        <p class="serif" style="font-size: 1.2rem; margin-top: 0.5rem; color: var(--color-ivory);">The Founder<br>123 Heritage Lane<br>New York, NY 10001</p>
      </div>
      <div style="text-align: right;">
        <span class="caption">Total</span>
        <p class="serif" style="font-size: 1.5rem; margin-top: 0.5rem; color: var(--color-gold);">$45.00</p>
      </div>
    </div>

    <a href="index.html" class="btn-primary" style="border-color: var(--color-ivory); color: var(--color-ivory);">Return to Origin</a>
  </div>

  <script src="js/animations.js"></script>
</body>
</html>
